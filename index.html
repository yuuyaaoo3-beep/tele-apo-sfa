<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あぽまるくん</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-bg: #ffffff; --c-bg2: #f5f5f5; --c-bg3: #ebebeb;
    --c-text: #1a1a1a; --c-text2: #555; --c-text3: #999;
    --c-border: #ddd;
    --c-blue: #1a73e8; --c-blue-bg: #e8f0fe; --c-blue-text: #1a56c4;
    --c-green: #1e8e3e; --c-green-bg: #e6f4ea;
    --c-red: #c5221f; --c-red-bg: #fce8e6;
    --c-yellow-bg: #fef7e0; --c-yellow-text: #b06000;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; background: var(--c-bg2); color: var(--c-text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .nav { background: var(--c-bg); border-bottom: 1px solid var(--c-border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; height: 56px; }
  .nav-logo { font-size: 16px; font-weight: 700; color: var(--c-blue); }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab { padding: 8px 13px; font-size: 13px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius); color: var(--c-text2); font-family: inherit; }
  .nav-tab:hover { background: var(--c-bg2); }
  .nav-tab.active { background: var(--c-blue-bg); color: var(--c-blue-text); font-weight: 600; }
  .nav-user { font-size: 12px; color: var(--c-text2); display: flex; align-items: center; gap: 12px; }
  #app { max-width: 1280px; margin: 0 auto; padding: 0 16px 60px; }
  button { font-family: inherit; font-size: 13px; border-radius: var(--radius); border: 1px solid var(--c-border); background: var(--c-bg); color: var(--c-text); cursor: pointer; padding: 7px 14px; transition: background .15s; }
  button:hover { background: var(--c-bg2); }
  button.primary { background: var(--c-blue); color: #fff; border-color: var(--c-blue); }
  button.primary:hover { background: #1557b0; }
  button.danger { color: var(--c-red); border-color: transparent; background: transparent; }
  button.danger:hover { background: var(--c-red-bg); }
  button.sm { padding: 4px 10px; font-size: 12px; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  input, select, textarea { font-family: inherit; font-size: 13px; border: 1px solid var(--c-border); border-radius: var(--radius); padding: 8px 10px; width: 100%; background: var(--c-bg); color: var(--c-text); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
  label { font-size: 12px; color: var(--c-text2); display: block; margin-bottom: 4px; }
  .fg2 { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; }
  .fa { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .card { background: var(--c-bg); border: 1px solid var(--c-border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
  .tw { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--c-border); }
  table { width: 100%; border-collapse: collapse; background: var(--c-bg); }
  th { text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--c-text2); border-bottom: 1px solid var(--c-border); background: var(--c-bg2); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--c-border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.row:hover td { background: var(--c-bg2); cursor: pointer; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .ph { display: flex; justify-content: space-between; align-items: center; margin: 24px 0 16px; }
  .pt { font-size: 20px; font-weight: 700; }
  .filter-bar { background: var(--c-bg); border: 1px solid var(--c-border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 10px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--c-bg); border: 1px solid var(--c-border); border-radius: var(--radius-lg); padding: 16px; }
  .stat-label { font-size: 12px; color: var(--c-text2); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .ptabs { display: flex; gap: 4px; }
  .ptab { padding: 6px 14px; font-size: 12px; border-radius: 20px; border: 1px solid var(--c-border); background: transparent; cursor: pointer; font-family: inherit; }
  .ptab.active { background: var(--c-blue); color: #fff; border-color: var(--c-blue); }
  .s-未架電{background:#f1f0e8;color:#444} .s-架電済{background:#e8f0fe;color:#174ea6}
  .s-架電NG{background:#fce8e6;color:#a50e0e} .s-ナーチャリング{background:#fef7e0;color:#b06000}
  .s-アポ獲得{background:#e6f4ea;color:#137333} .s-初回商談{background:#e0f7f4;color:#0d5f54}
  .s-提案中{background:#f3e8fd;color:#5b2d9e} .s-検討中{background:#fce8f3;color:#8d1f5e}
  .s-受注{background:#c0dd97;color:#173404} .s-失注{background:#e8e8e8;color:#444}
  .r-A{background:#fff0e0;color:#c05000;font-weight:700;border:1px solid #f0c080}
  .r-B{background:#e8f0fe;color:#1a56c4;font-weight:700;border:1px solid #a8c4f0}
  .r-C{background:#e6f4ea;color:#137333;font-weight:700;border:1px solid #90d0a8}
  .r-D{background:#f0f0f0;color:#555;font-weight:700;border:1px solid #ccc}
  .r-未設定{background:#f5f5f5;color:#aaa;border:1px solid #ddd}
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background:var(--c-bg); border:1px solid var(--c-border); border-radius:var(--radius-lg); padding:40px; width:100%; max-width:420px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
  .login-title { font-size:22px; font-weight:700; text-align:center; margin-bottom:8px; color:var(--c-blue); }
  .login-sub { font-size:13px; color:var(--c-text2); text-align:center; margin-bottom:28px; }
  .err-box { background:var(--c-red-bg); color:var(--c-red); padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:12px; }
  .ok-box { background:var(--c-green-bg); color:var(--c-green); padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:12px; }
  .pos{color:var(--c-green);font-weight:600} .neg{color:var(--c-red);font-weight:600}
  .loading { text-align:center; padding:60px; color:var(--c-text3); font-size:15px; }
  .toast { position:fixed; bottom:24px; right:24px; background:#323232; color:#fff; padding:12px 20px; border-radius:var(--radius); font-size:13px; z-index:9999; animation:fi .2s; }
  @keyframes fi { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .call-card { background:var(--c-bg2); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
  .call-meta { display:flex; gap:10px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
  .section-title { font-size:15px; font-weight:600; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .tabs { display:flex; border-bottom:1px solid var(--c-border); margin-bottom:16px; }
  .tab { padding:10px 18px; font-size:13px; border:none; background:transparent; cursor:pointer; font-family:inherit; color:var(--c-text2); border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab.active { color:var(--c-blue); border-bottom-color:var(--c-blue); font-weight:600; }
  .contact-card { background:var(--c-bg2); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
  .contact-header { display:flex; justify-content:space-between; align-items:flex-start; }
  .contact-name { font-weight:600; font-size:14px; }
  .contact-sub { font-size:12px; color:var(--c-text2); margin-top:2px; }
  .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:8px 24px; }
  .info-row { display:flex; gap:8px; font-size:13px; }
  .info-label { color:var(--c-text2); min-width:100px; flex-shrink:0; }
  .anote { background:var(--c-yellow-bg); color:var(--c-yellow-text); padding:10px 14px; border-radius:var(--radius); font-size:12px; margin-bottom:14px; }
  .user-switcher { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .user-chip { padding:6px 14px; border-radius:20px; font-size:12px; border:1px solid var(--c-border); cursor:pointer; background:var(--c-bg); font-family:inherit; }
  .user-chip.active { background:var(--c-blue); color:#fff; border-color:var(--c-blue); }
  .assign-select { font-size:12px; padding:4px 8px; border-radius:var(--radius); border:1px solid var(--c-border); background:var(--c-bg); font-family:inherit; cursor:pointer; }
  .pw-hint { font-size:11px; color:var(--c-text3); margin-top:4px; }
  .login-mode-link { text-align:center; margin-top:16px; font-size:13px; color:var(--c-blue); cursor:pointer; text-decoration:underline; }

  /* ===== 重複検知 ===== */
  .dup-icon {
    display:inline-flex; align-items:center; justify-content:center;
    width:18px; height:18px; border-radius:50%; background:#f59e0b; color:#fff;
    font-size:11px; font-weight:700; cursor:default; margin-left:6px;
    position:relative; flex-shrink:0; vertical-align:middle;
  }
  .dup-icon:hover .dup-tooltip { display:block; }
  .dup-tooltip {
    display:none; position:absolute; left:50%; top:calc(100% + 6px);
    transform:translateX(-50%); background:#323232; color:#fff; font-size:12px;
    padding:8px 12px; border-radius:6px; z-index:300; min-width:220px; max-width:320px;
    white-space:normal; line-height:1.6; pointer-events:none;
  }
  .dup-tooltip::before {
    content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-bottom-color:#323232;
  }
  /* ===== 一括編集バー ===== */
  .bulk-bar {
    background:#1a73e8; color:#fff; padding:10px 16px; border-radius:var(--radius);
    margin-bottom:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .bulk-bar button { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); color:#fff; }
  .bulk-bar button:hover { background:rgba(255,255,255,.35); }
  .bulk-bar button.bdanger { background:rgba(220,53,69,.75); border-color:transparent; color:#fff; }
  .bulk-bar button.bdanger:hover { background:rgba(220,53,69,.9); }
  tr.row.selected td { background:#e8f0fe !important; }
  .row-cb { width:16px; height:16px; cursor:pointer; }
  /* ===== 重複バナー（詳細画面） ===== */

<script type="module">

import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfuI8QrZZJml1HCmFa7VeYXh81k07kHnM",

};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const col = n => collection(db, n);
const ref = (n, id) => doc(db, n, id);

const CALL_RESULTS = ['不通','受付NG','担当者不在','有効応答','担当者NG','資料送付','アポ獲得','ミスディレクション'];
const STATUSES = ['未架電','架電済','架電NG','ナーチャリング','アポ獲得','初回商談','提案中','検討中','受注','失注'];
const RANKS = ['A','B','C','D'];

// ============================================================
// State
// ============================================================
let st = { loaded:false, authReady:false, firebaseUser:null, user:null, users:[], customers:[], contacts:[], calls:[], view:'dashboard', selId:null };
let dashPeriod = 'day';
let dashUserFilter = '';
let cf = { search:'', status:'', pref:'', minE:'', maxE:'', res:'', assignee:'', rank:'' };
let showAddC=false, editCid=null, showCallF=false, editUid=null, showAddU=false;
let showAddContact=false, editContactId=null;
let importPrev=[], importTxt='', importRank='';
let importSkipSet = new Set(); // CSV: スキップする行インデックス
let detailTab = 'contacts';
let assignViewUid = '';
let loginMode = 'login';
let loginMsg = null;
let bulkMode = false;         // 一括編集モード
let bulkSelected = new Set(); // 選択中の顧客id

const ts = () => new Date().toISOString();
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isUrl = s => /^https?:\/\/.+/.test((s||'').trim());
const rankBadge = r => r ? `<span class="badge r-${r}">${r}ランク</span>` : `<span class="badge r-未設定">未設定</span>`;

// ============================================================
// 重複判定ロジック
// ・空欄同士は一致とみなさない
// ・電話番号 / メール / URL のいずれか1つが一致したら重複
// ============================================================
function normVal(s) {
  return (s||'').trim().toLowerCase().replace(/[-\s]/g,'');
}

function isDup(a, b) {
  if (a.id === b.id) return false;
  const match = (v1, v2) => { const n1=normVal(v1), n2=normVal(v2); return n1 && n2 && n1===n2; };
  return match(a.companyPhone, b.companyPhone)
      || match(a.companyEmail, b.companyEmail)
      || match(a.website,      b.website);
}

// 顧客ID → 重複候補配列 のMap（一度だけ生成して使う）
function buildDupMap() {
  const map = new Map();
  const list = st.customers;
  for (let i=0; i<list.length; i++) {
    const dups = [];
    for (let j=0; j<list.length; j++) {
      if (isDup(list[i], list[j])) dups.push(list[j]);
    }
    if (dups.length) map.set(list[i].id, dups);
  }
  return map;
}

// CSV行オブジェクトと既存顧客の重複判定
function findCsvDups(row) {
  const norm = normVal;
  const phone = norm(row['電話番号']||row['電話番号（会社）']||'');
  const email = norm(row['メールアドレス']||row['メールアドレス（会社）']||'');
  const rawUrl = row['会社URL']||row['HP（URL）']||row['HP']||'';
  const url = norm(isUrl(rawUrl) ? rawUrl : '');
  return st.customers.filter(c => {
    const cp=norm(c.companyPhone||''), ce=norm(c.companyEmail||''), cw=norm(c.website||'');
    return (phone && cp && phone===cp) || (email && ce && email===ce) || (url && cw && url===cw);
  });
}

// フォーム入力値と既存顧客の重複判定（リアルタイム）
function findFormDups(data) {
  const norm = normVal;
  const phone = norm(data.companyPhone);
  const email = norm(data.companyEmail);
  const url = norm(isUrl(data.website) ? data.website : '');
  return st.customers.filter(c => {
    if (editCid && c.id===editCid) return false; // 編集中の自身を除外
    const cp=norm(c.companyPhone||''), ce=norm(c.companyEmail||''), cw=norm(c.website||'');
    return (phone && cp && phone===cp) || (email && ce && email===ce) || (url && cw && url===cw);
  });
}

// 重複理由テキスト
function dupReasons(a, b) {
  const match = (v1,v2) => { const n1=normVal(v1),n2=normVal(v2); return n1&&n2&&n1===n2; };
  const r=[];
  if (match(a.companyPhone, b.companyPhone)) r.push('電話番号が一致');
  if (match(a.companyEmail, b.companyEmail)) r.push('メールが一致');
  if (match(a.website,      b.website))      r.push('URLが一致');
  return r.join('・');
}

// ============================================================
// Firebase Auth
// ============================================================
onAuthStateChanged(auth, async (firebaseUser) => {
  st.firebaseUser = firebaseUser;
  st.authReady = true;
  if (firebaseUser) {
    await loadData();
    st.user = st.users.find(u => u.uid === firebaseUser.uid) || null;
    if (!st.user) st.user = st.users.find(u => (u.email||'').toLowerCase() === (firebaseUser.email||'').toLowerCase()) || null;
    if (st.user && !assignViewUid) assignViewUid = st.user.id;
    if (!dashUserFilter && st.users[0]) dashUserFilter = st.users[0].id;
  } else { st.user = null; }
  st.loaded = true;
  render();
});

async function loadData() {
  const [us,cs,cts,hs] = await Promise.all([getDocs(col('users')),getDocs(col('customers')),getDocs(col('contacts')),getDocs(col('callHistory'))]);
  st.users=us.docs.map(d=>({id:d.id,...d.data()}));
  st.customers=cs.docs.map(d=>({id:d.id,...d.data()}));
  st.contacts=cts.docs.map(d=>({id:d.id,...d.data()}));
  st.calls=hs.docs.map(d=>({id:d.id,...d.data()}));
}
async function reload() { await loadData(); }

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

function parseCSV(text) {
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const obj={};hdrs.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

function authErrMsg(code) {
  const map={'auth/invalid-email':'メールアドレスの形式が正しくありません','auth/user-not-found':'このメールアドレスは登録されていません','auth/wrong-password':'パスワードが間違っています','auth/invalid-credential':'メールアドレスまたはパスワードが間違っています','auth/email-already-in-use':'このメールアドレスは既に使用されています','auth/weak-password':'パスワードは6文字以上で設定してください','auth/too-many-requests':'ログイン試行が多すぎます。しばらく待ってからお試しください'};
  return map[code]||`エラーが発生しました（${code}）`;
}

  const root=document.getElementById('root');
  if(!st.authReady||!st.loaded){root.innerHTML='<div class="loading">読み込み中...</div>';return;}
  if(st.firebaseUser&&!st.user){root.innerHTML=rFirstSetup();bFirstSetup();return;}

  root.innerHTML=rApp();bApp();
}

function bLogin() {
  document.getElementById('lmode-link').onclick=()=>{loginMode=loginMode==='login'?'reset':'login';loginMsg=null;render();};
  const doAction=async()=>{
    const btn=document.getElementById('lbtn');
    const email=document.getElementById('lemail').value.trim();
    if(!email){loginMsg={type:'err',text:'メールアドレスを入力してください'};render();return;}
    btn.disabled=true;
    if(loginMode==='reset'){
      try{await sendPasswordResetEmail(auth,email);loginMsg={type:'ok',text:'パスワードリセットのメールを送信しました。'};loginMode='login';}
      catch(e){loginMsg={type:'err',text:authErrMsg(e.code)};}
      render();return;
    }
    const pass=document.getElementById('lpass').value;
    if(!pass){loginMsg={type:'err',text:'パスワードを入力してください'};btn.disabled=false;return;}
    try{await signInWithEmailAndPassword(auth,email,pass);loginMsg=null;}
    catch(e){loginMsg={type:'err',text:authErrMsg(e.code)};render();}
  };
  document.getElementById('lbtn').onclick=doAction;
  const p=document.getElementById('lpass');if(p)p.onkeydown=e=>{if(e.key==='Enter')doAction();};
  const em=document.getElementById('lemail');if(em)em.onkeydown=e=>{if(loginMode==='reset'&&e.key==='Enter')doAction();};
}

// ---- First Setup ----
function rFirstSetup() {
  return `<div class="login-wrap"><div class="login-card">
  <div class="login-title" style="font-size:18px">初回セットアップ</div>
  <div class="login-sub">管理者アカウントを作成します</div>
  <div id="fs-err" style="display:none" class="err-box"></div>
  <div style="margin-bottom:12px"><label>表示名</label><input id="fs-name" placeholder="例：山田 太郎"></div>
  <button class="primary" id="fs-save" style="width:100%;padding:10px">管理者として登録する</button>
  <button id="fs-logout" style="width:100%;margin-top:10px">ログアウト</button>
  </div></div>`;
}
function bFirstSetup() {
  document.getElementById('fs-logout').onclick=()=>signOut(auth);
  document.getElementById('fs-save').onclick=async()=>{
    const name=document.getElementById('fs-name').value.trim();
    const errEl=document.getElementById('fs-err');
    if(!name){errEl.textContent='表示名を入力してください';errEl.style.display='block';return;}
    const data={name,email:st.firebaseUser.email,uid:st.firebaseUser.uid,role:'admin',callTarget:50,apoTarget:5,createdAt:ts()};
    const r=await addDoc(col('users'),data);
    st.users.push({id:r.id,...data});st.user={id:r.id,...data};assignViewUid=r.id;
    st.view='dashboard';toast('管理者アカウントを作成しました');render();
  };
}

// ---- App Shell ----

function bApp() {
  document.querySelectorAll('.nav-tab').forEach(b=>b.onclick=()=>{
    st.view=b.dataset.v; bulkMode=false; bulkSelected.clear(); render();
  });
  document.getElementById('logout').onclick=async()=>{await signOut(auth);st.user=null;st.view='dashboard';loginMode='login';loginMsg=null;};
  if(st.view==='dashboard')bDash();
  if(st.view==='customers')bCustList();
  if(st.view==='detail')bDetail();
  if(st.view==='mylist')bMyList();
  if(st.view==='import')bImport();
  if(st.view==='settings')bSettings();
}

const FLOW_STATUSES = ['未架電','架電済','アポ獲得','初回商談','提案中','検討中','受注'];
const SUB_STATUSES  = ['架電NG','ナーチャリング','失注'];
const FLOW_COLORS = {
  '未架電':{bg:'#f1f0e8',text:'#555'},'架電済':{bg:'#dce8fd',text:'#1a56c4'},
  'アポ獲得':{bg:'#c8e6d4',text:'#0d6e2e'},'初回商談':{bg:'#b8e0da',text:'#0a5048'},
  '提案中':{bg:'#d8c8f8',text:'#4a20a0'},'検討中':{bg:'#f0c0df',text:'#7a1050'},
  '受注':{bg:'#a8d870',text:'#173404'},
};

function rFlowRow(statusCounts, isUser) {
  const last=FLOW_STATUSES.length-1; const AW=16;
  return `<div style="display:flex;align-items:stretch;overflow-x:auto;padding:2px 0;">` +
    FLOW_STATUSES.map((s,i)=>{
      const c=FLOW_COLORS[s]; const count=statusCounts[s]||0;
      const isFirst=i===0, isLast=i===last;
      const pts = isFirst&&isLast ? '0 0,100% 0,100% 100%,0 100%'
        : isFirst ? `0 0,calc(100% - ${AW}px) 0,100% 50%,calc(100% - ${AW}px) 100%,0 100%`
        : isLast  ? `0 0,100% 0,100% 100%,0 100%,${AW}px 50%`
        : `0 0,calc(100% - ${AW}px) 0,100% 50%,calc(100% - ${AW}px) 100%,0 100%,${AW}px 50%`;
      return `<div class="flow-step" data-status="${esc(s)}" data-user="${isUser?'1':'0'}"
        style="flex:1;min-width:90px;height:76px;background:${c.bg};color:${c.text};
               clip-path:polygon(${pts});margin-left:${isFirst?'0':'-'+AW+'px'};z-index:${last-i+2};
               display:flex;flex-direction:column;align-items:center;justify-content:center;
               text-align:center;cursor:pointer;transition:filter .15s;
               padding:0 ${isLast?10:AW+8}px 0 ${isFirst?14:AW+8}px;">
        <div style="font-size:10px;font-weight:600;opacity:.7;white-space:nowrap;margin-bottom:3px">${esc(s)}</div>

}

function rSubCard(status,count,isUser) {
  return `<div class="sub-step" data-status="${esc(status)}" data-user="${isUser?'1':'0'}"
    style="background:var(--c-bg2);border:1px solid var(--c-border);color:var(--c-text3);
           border-radius:6px;padding:10px 16px;cursor:pointer;transition:filter .15s;min-width:80px;text-align:center;">

}

function rDash() {
  const now=new Date(),s=new Date();
  if(dashPeriod==='day')s.setHours(0,0,0,0);
  else if(dashPeriod==='week')s.setDate(now.getDate()-7);
  else s.setMonth(now.getMonth()-1);
  const fc=st.calls.filter(c=>new Date(c.calledAt)>=s);
  const sc={};STATUSES.forEach(x=>sc[x]=0);
  st.customers.forEach(c=>{const x=c.status||'未架電';if(sc[x]!==undefined)sc[x]++;});
  const pL={day:'本日',week:'週間',month:'月間'};
  const rows=st.users.map(u=>{
    const uc=fc.filter(c=>c.userId===u.id);
    const ap=uc.filter(c=>c.result==='アポ獲得').length;

    <td style="text-align:right">${uc.length}</td><td style="text-align:right;color:var(--c-text2)">${u.callTarget||0}</td>
    <td style="text-align:right" class="${cd>=0?'pos':'neg'}">${cd>=0?'+':''}${cd}</td>

  const usc={};STATUSES.forEach(x=>usc[x]=0);
  let assignedTotal=0;
  st.customers.forEach(c=>{if(c.assigneeId===uid){const x=c.status||'未架電';if(usc[x]!==undefined)usc[x]++;assignedTotal++;}});
  return `<div class="ph"><div class="pt">ダッシュボード</div>
  <div class="ptabs">${['day','week','month'].map(p=>`<button class="ptab${dashPeriod===p?' active':''}" data-p="${p}">${pL[p]}</button>`).join('')}</div></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">総顧客数</div><div class="stat-value">${st.customers.length.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">期間内架電数</div><div class="stat-value">${fc.length}</div></div>
    <div class="stat-card"><div class="stat-label">アポ獲得（累計）</div><div class="stat-value">${st.customers.filter(c=>c.status==='アポ獲得').length}</div></div>
    <div class="stat-card"><div class="stat-label">受注（累計）</div><div class="stat-value">${st.customers.filter(c=>c.status==='受注').length}</div></div>
  </div>
  <div class="card"><div class="section-title">ユーザー別実績（${pL[dashPeriod]}）</div>
  <div class="tw"><table><thead><tr>
    <th>ユーザー</th><th style="text-align:right">架電数</th><th style="text-align:right">架電目標</th><th style="text-align:right">差分</th>
    <th style="text-align:right">アポ獲得</th><th style="text-align:right">アポ目標</th><th style="text-align:right">差分</th>
  </tr></thead><tbody>${rows}</tbody></table></div></div>
  <div class="card">
    <div class="section-title" style="margin-bottom:14px">
      <span>営業フロー（全体）</span><span style="font-size:12px;color:var(--c-text2);font-weight:400">クリックで顧客リストへ</span>
    </div>
    ${rFlowRow(sc,false)}
    <div style="border-top:1px solid var(--c-border);padding-top:12px;margin-top:14px">
      <div style="font-size:11px;color:var(--c-text3);margin-bottom:8px">その他</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${SUB_STATUSES.map(s=>rSubCard(s,sc[s],false)).join('')}</div>
    </div>
  </div>
  <div class="card">
    <div class="section-title" style="margin-bottom:14px">
      <span>営業フロー（ユーザー別）</span>
      <select id="dash-user-sel" style="font-size:13px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--c-border);background:var(--c-bg);font-family:inherit;min-width:140px">
        ${st.users.map(u=>`<option value="${u.id}"${dashUserFilter===u.id?' selected':''}>${esc(u.name)}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:12px;color:var(--c-text2);margin-bottom:12px">担当顧客数：${assignedTotal}件</div>
    ${rFlowRow(usc,true)}
    <div style="border-top:1px solid var(--c-border);padding-top:12px;margin-top:14px">
      <div style="font-size:11px;color:var(--c-text3);margin-bottom:8px">その他</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${SUB_STATUSES.map(s=>rSubCard(s,usc[s],true)).join('')}</div>
    </div>
  </div>`;
}

function bDash() {
  document.querySelectorAll('.ptab').forEach(b=>b.onclick=()=>{dashPeriod=b.dataset.p;render();});
  const sel=document.getElementById('dash-user-sel');

// ============================================================
// Customer List ── 重複検知アイコン・一括編集
// ============================================================
function rCustList() {
  const fil = filteredC();
  const dupMap = buildDupMap();
  const dupTotalCount = dupMap.size; // 重複のある顧客数

  const userOpts=`<option value="">担当者（全て）</option>${st.users.map(u=>`<option value="${u.id}"${cf.assignee===u.id?' selected':''}>${esc(u.name)}</option>`).join('')}`;
  const rankOpts=`<option value="">ランク（全て）</option>${RANKS.map(r=>`<option value="${r}"${cf.rank===r?' selected':''}>${r}ランク</option>`).join('')}<option value="未設定"${cf.rank==='未設定'?' selected':''}>未設定</option>`;

  // 重複バナー（一括編集モードでなければ表示）
  const dupBanner = dupTotalCount > 0 && !bulkMode
    ? `<div style="background:#fff8e1;border:1px solid #f59e0b;border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:13px;color:#b45309;font-weight:600">⚠️ 重複の可能性がある顧客が ${dupTotalCount} 件あります</span>
        <button id="start-bulk" style="font-size:12px;padding:4px 12px;border-color:#f59e0b;color:#b45309">一括確認・削除</button>
      </div>` : '';

  // 一括編集バー
  const bulkBar = bulkMode
    ? `<div class="bulk-bar">
        <span style="font-weight:600">${bulkSelected.size}件を選択中</span>
        <button id="bulk-all">全て選択</button>
        <button id="bulk-none">選択解除</button>
        <button class="bdanger" id="bulk-del" ${bulkSelected.size===0?'disabled':''}>選択した${bulkSelected.size}件を削除</button>
        <button id="bulk-cancel" style="margin-left:auto">キャンセル</button>
      </div>` : '';

  // テーブルヘッダー（一括編集時はCBカラム追加）
  const thCb = bulkMode ? `<th style="width:40px"><input type="checkbox" id="cb-all" class="row-cb" title="全選択"></th>` : '';

  return `<div class="ph">
    <div class="pt">顧客リスト（${fil.length}件）</div>
    <div style="display:flex;gap:8px">
      ${!bulkMode?`<button id="start-bulk-btn">一括編集</button>`:''}
      ${!bulkMode?`<button id="export-csv">CSVエクスポート</button>`:''}
      ${!bulkMode?`<button class="primary" id="add-c">+ 新規追加</button>`:''}
    </div>
  </div>
  ${dupBanner}
  <div class="filter-bar">
    <input id="fs" placeholder="会社名・電話番号" value="${esc(cf.search)}">
    <select id="fst"><option value="">ステータス（全て）</option>${STATUSES.map(s=>`<option value="${s}"${cf.status===s?' selected':''}>${s}</option>`).join('')}</select>
    <select id="frk">${rankOpts}</select>
    <input id="fp" placeholder="都道府県" value="${esc(cf.pref)}">
    <select id="fa">${userOpts}</select>
    <select id="fr"><option value="">架電結果（全て）</option>${CALL_RESULTS.map(r=>`<option value="${r}"${cf.res===r?' selected':''}>${r}</option>`).join('')}</select>
    <input id="fmn" type="number" placeholder="従業員数（最小）" value="${cf.minE}">
    <input id="fmx" type="number" placeholder="従業員数（最大）" value="${cf.maxE}">
    <button id="fclr">クリア</button>
  </div>
  ${bulkBar}
  ${showAddC?rCustForm(null):''}
  <div class="tw"><table><thead><tr>
    ${thCb}<th>会社名</th><th>電話番号</th><th>地域</th><th style="text-align:right">従業員数</th><th>ランク</th><th>ステータス</th>${!bulkMode?'<th>担当者</th>':''}
  </tr></thead><tbody>
  ${fil.length===0
    ?`<tr><td colspan="${bulkMode?7:8}" style="text-align:center;color:var(--c-text3);padding:32px">顧客データがありません</td></tr>`
    :fil.map(c=>{
      const dups = dupMap.get(c.id);
      // 重複アイコン（件数+会社名一覧）
      const dupIcon = dups
        ? `<span class="dup-icon" tabindex="0">!<span class="dup-tooltip">⚠️ ${dups.length}件の重複候補<br>${dups.map(d=>`・${esc(d.companyName)}`).join('<br>')}</span></span>`
        : '';
      // チェックボックスセル（一括編集時のみ）
      const cbCell = bulkMode
        ? `<td onclick="event.stopPropagation()"><input type="checkbox" class="row-cb bulk-cb" data-id="${c.id}" ${bulkSelected.has(c.id)?'checked':''}></td>`
        : '';
      // 担当者セル（通常モードのみ）
      const assignCell = !bulkMode
        ? `<td><select class="assign-select" data-cid="${c.id}" onclick="event.stopPropagation()">
            <option value="">未割り当て</option>
            ${st.users.map(u=>`<option value="${u.id}"${c.assigneeId===u.id?' selected':''}>${esc(u.name)}</option>`).join('')}
          </select></td>`
        : '';
      return `<tr class="row${bulkSelected.has(c.id)?' selected':''}${c.doNotCall?' dnc':''}" data-id="${c.id}">
        ${cbCell}
        <td><strong>${esc(c.companyName)}</strong>${dupIcon}${c.doNotCall?'<span style="margin-left:6px;font-size:10px;background:var(--c-red);color:#fff;padding:2px 6px;border-radius:4px;vertical-align:middle">架電禁止</span>':''}</td>
        <td>${c.companyPhone?`<a href="tel:${esc(c.companyPhone)}" onclick="event.stopPropagation()">${esc(c.companyPhone)}</a>`:'-'}</td>
        <td style="color:var(--c-text2)">${esc([c.prefecture,c.city].filter(Boolean).join(' ')||'-')}</td>
        <td style="text-align:right">${c.employees?parseInt(c.employees).toLocaleString()+' 名':'-'}</td>
        <td>${rankBadge(c.rank)}</td>
        <td><span class="badge s-${c.status||'未架電'}">${c.status||'未架電'}</span></td>
        ${assignCell}
      </tr>`;
    }).join('')}
  </tbody></table></div>`;
}

function filteredC() {
  return st.customers.filter(c=>{
    const s=cf.search.toLowerCase();
    if(s&&!((c.companyName||'').toLowerCase().includes(s)||(c.companyPhone||'').includes(cf.search)))return false;
    if(cf.status&&(c.status||'未架電')!==cf.status)return false;
    if(cf.pref&&!(c.prefecture||'').includes(cf.pref))return false;
    if(cf.minE&&(parseInt(c.employees)||0)<parseInt(cf.minE))return false;
    if(cf.maxE&&(parseInt(c.employees)||0)>parseInt(cf.maxE))return false;
    if(cf.res){const calls=st.calls.filter(h=>h.customerId===c.id);if(!calls.some(h=>h.result===cf.res))return false;}
    if(cf.assignee&&c.assigneeId!==cf.assignee)return false;
    if(cf.rank){const cr=c.rank||'未設定';if(cf.rank==='未設定'?cr!=='未設定':cr!==cf.rank)return false;}
    return true;
  });
}

function bCustList() {
  const bind=(id,key)=>{const el=document.getElementById(id);if(!el)return;el.addEventListener('input',()=>{cf[key]=el.value;render();});el.addEventListener('change',()=>{cf[key]=el.value;render();});};
  bind('fs','search');bind('fst','status');bind('fp','pref');bind('fr','res');bind('fmn','minE');bind('fmx','maxE');bind('fa','assignee');bind('frk','rank');
  document.getElementById('fclr').onclick=()=>{cf={search:'',status:'',pref:'',minE:'',maxE:'',res:'',assignee:'',rank:''};render();};
  const elExport=document.getElementById('export-csv');
  if(elExport)elExport.onclick=()=>{
    const fil=filteredC();
    const headers=['会社名','電話番号','メールアドレス','HP','都道府県','市区町村','従業員数','資本金','更新回数','ランク','ステータス','担当者','登録日','架電禁止'];
    const rows=fil.map(c=>{
      const assignee=st.users.find(u=>u.id===c.assigneeId);
      return [c.companyName,c.companyPhone,c.companyEmail,c.website,c.prefecture,c.city,c.employees,c.capital,c.renewalCount,c.rank,c.status,assignee?assignee.name:'',c.createdAt?new Date(c.createdAt).toLocaleDateString('ja-JP'):'',c.doNotCall?'禁止':''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`);
    });
    const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`顧客リスト_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'')}.csv`;
    a.click();URL.revokeObjectURL(url);
    toast(`${fil.length}件をエクスポートしました`);
  };

  // 一括編集開始ボタン（バナー内・ヘッダー内）
  const startBulkBanner = document.getElementById('start-bulk');
  if(startBulkBanner) startBulkBanner.onclick = ()=>{bulkMode=true;bulkSelected.clear();render();};
  const startBulkBtn = document.getElementById('start-bulk-btn');
  if(startBulkBtn) startBulkBtn.onclick = ()=>{bulkMode=true;bulkSelected.clear();render();};

  if(bulkMode) {
    // ── 一括編集モード ──
    const fil = filteredC();

    // 全選択CB
    const cbAll = document.getElementById('cb-all');
    if(cbAll) {
      cbAll.checked = fil.length>0 && fil.every(c=>bulkSelected.has(c.id));
      cbAll.onchange = ()=>{ if(cbAll.checked) fil.forEach(c=>bulkSelected.add(c.id)); else fil.forEach(c=>bulkSelected.delete(c.id)); render(); };
    }
    // 個別CB
    document.querySelectorAll('.bulk-cb').forEach(cb=>{
      cb.onchange = ()=>{ if(cb.checked) bulkSelected.add(cb.dataset.id); else bulkSelected.delete(cb.dataset.id); render(); };
    });

    const elAll = document.getElementById('bulk-all');
    if(elAll) elAll.onclick = ()=>{fil.forEach(c=>bulkSelected.add(c.id));render();};
    const elNone = document.getElementById('bulk-none');
    if(elNone) elNone.onclick = ()=>{bulkSelected.clear();render();};
    const elCancel = document.getElementById('bulk-cancel');
    if(elCancel) elCancel.onclick = ()=>{bulkMode=false;bulkSelected.clear();render();};

    // 一括削除
    const elDel = document.getElementById('bulk-del');
    if(elDel) elDel.onclick = async()=>{
      if(!bulkSelected.size) return;
      if(!confirm(`選択した ${bulkSelected.size} 件を削除しますか？\n担当者・架電履歴も全て削除されます。`)) return;
      elDel.disabled=true; elDel.textContent='削除中...';
      for(const cid of bulkSelected) {
        await deleteDoc(ref('customers',cid));
        const rC=st.calls.filter(h=>h.customerId===cid);
        const rCt=st.contacts.filter(ct=>ct.customerId===cid);
        await Promise.all([...rC.map(h=>deleteDoc(ref('callHistory',h.id))),...rCt.map(ct=>deleteDoc(ref('contacts',ct.id)))]);
        st.customers=st.customers.filter(x=>x.id!==cid);
        st.calls=st.calls.filter(x=>x.customerId!==cid);
        st.contacts=st.contacts.filter(x=>x.customerId!==cid);
      }
      const cnt=bulkSelected.size; bulkSelected.clear(); bulkMode=false;
      toast(`${cnt}件を削除しました`); render();
    };

    // 行クリック = チェックトグル
    document.querySelectorAll('tr.row[data-id]').forEach(tr=>{
      tr.onclick = ()=>{
        const id=tr.dataset.id;
        if(bulkSelected.has(id)) bulkSelected.delete(id); else bulkSelected.add(id);
        render();
      };
    });

  } else {
    // ── 通常モード ──
    const addEl=document.getElementById('add-c');
    if(addEl) addEl.onclick=()=>{showAddC=!showAddC;render();};
    document.querySelectorAll('tr.row[data-id]').forEach(tr=>tr.onclick=()=>{
      st.selId=tr.dataset.id;st.view='detail';detailTab='contacts';showCallF=false;editCid=null;showAddContact=false;editContactId=null;render();
    });
    document.querySelectorAll('.assign-select').forEach(sel=>{
      sel.onchange=async e=>{
        const cid=sel.dataset.cid,val=e.target.value;
        await updateDoc(ref('customers',cid),{assigneeId:val});
        const c=st.customers.find(x=>x.id===cid);if(c)c.assigneeId=val;
        toast('担当者を更新しました');
      };
    });
  }
  bCustForm(null);
}

function getCustFormData() {
  return {
    companyName:document.getElementById('cf-cn').value.trim(),
    companyPhone:document.getElementById('cf-cp').value.trim(),
    companyEmail:document.getElementById('cf-ce').value.trim(),
    website:document.getElementById('cf-ws').value.trim(),
    employees:document.getElementById('cf-em').value,
    capital:document.getElementById('cf-ca').value,
    renewalCount:document.getElementById('cf-re').value,
    prefecture:document.getElementById('cf-pf').value.trim(),
    city:document.getElementById('cf-ct').value.trim(),
    rank:document.getElementById('cf-rk').value,
  };
}
function bCustForm(customer) {
  const cancelEl=document.getElementById('cf-cancel');
  if(cancelEl) cancelEl.onclick=()=>{showAddC=false;editCid=null;render();};

  // リアルタイム重複チェック
  const checkDup = ()=>{
    const warnEl=document.getElementById('form-dup-warn');
    if(!warnEl) return;
    const dups=findFormDups(getCustFormData());
    if(dups.length) {
      warnEl.innerHTML=`⚠️ 既存の顧客と重複している可能性があります：${dups.map(d=>`<strong>${esc(d.companyName)}</strong>`).join('、')}`;
      warnEl.style.display='block';
    } else { warnEl.style.display='none'; }
  };
  ['cf-cp','cf-ce','cf-ws'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',checkDup);});

  const saveEl=document.getElementById('cf-save');
  if(saveEl) saveEl.onclick=async()=>{
    const data=getCustFormData();
    if(!data.companyName){alert('会社名は必須です');return;}
    if(saveEl.disabled)return;
    saveEl.disabled=true;
    try{
      if(customer){
        await updateDoc(ref('customers',customer.id),data);
        Object.assign(customer,data);editCid=null;toast('更新しました');
      } else {
        data.status='未架電';data.assigneeId='';data.createdAt=ts();
        const r=await addDoc(col('customers'),data);
        st.customers.push({id:r.id,...data});showAddC=false;toast('追加しました');
      }
      await reload();render();
    }catch(e){alert('保存に失敗しました: '+e.message);}
    finally{saveEl.disabled=false;}
  };
}

function bDetail() {
  const c=st.customers.find(x=>x.id===st.selId);if(!c)return;
  document.getElementById('back').onclick=()=>{st.view='customers';editCid=null;showCallF=false;showAddContact=false;editContactId=null;render();};
  document.querySelectorAll('.tab[data-tab]').forEach(b=>b.onclick=()=>{detailTab=b.dataset.tab;showCallF=false;showAddContact=false;editContactId=null;render();});

  // 重複バナーの「詳細を開く」リンク
  document.querySelectorAll('.dup-banner-link[data-dup-id]').forEach(el=>{
    el.onclick=()=>{st.selId=el.dataset.dupId;detailTab='contacts';showCallF=false;editCid=null;showAddContact=false;editContactId=null;render();};
  });

  const elEditC=document.getElementById('edit-c');if(elEditC)elEditC.onclick=()=>{editCid=c.id;render();};
  const elDnc=document.getElementById('dnc-toggle');
  if(elDnc)elDnc.onclick=async()=>{
    const newVal=!c.doNotCall;
    const msg=newVal?'この顧客を架電禁止に設定しますか？\n一覧で赤く強調表示されます。':'架電禁止を解除しますか？';
    if(!confirm(msg))return;
    try{await updateDoc(ref('customers',c.id),{doNotCall:newVal});c.doNotCall=newVal;toast(newVal?'架電禁止に設定しました':'架電禁止を解除しました');render();}
    catch(e){alert('更新に失敗しました: '+e.message);}
  };
  const elDelC=document.getElementById('del-c');
  if(elDelC)elDelC.onclick=async()=>{
    if(!confirm(`「${c.companyName}」を削除しますか？担当者・架電履歴も全て削除されます。`))return;
    await deleteDoc(ref('customers',c.id));
    const rC=st.calls.filter(h=>h.customerId===c.id),rCt=st.contacts.filter(ct=>ct.customerId===c.id);
    await Promise.all([...rC.map(h=>deleteDoc(ref('callHistory',h.id))),...rCt.map(ct=>deleteDoc(ref('contacts',ct.id)))]);
    st.customers=st.customers.filter(x=>x.id!==c.id);st.calls=st.calls.filter(x=>x.customerId!==c.id);st.contacts=st.contacts.filter(x=>x.customerId!==c.id);
    st.view='customers';toast('削除しました');render();
  };
  const elRank=document.getElementById('rank-sel');
  if(elRank)elRank.onchange=async e=>{await updateDoc(ref('customers',c.id),{rank:e.target.value});c.rank=e.target.value;toast('ランクを更新しました');render();};
  const elSts=document.getElementById('sts');
  if(elSts)elSts.onchange=async e=>{await updateDoc(ref('customers',c.id),{status:e.target.value});c.status=e.target.value;toast('ステータスを更新しました');};
  const elAss=document.getElementById('assignee-sel');
  if(elAss)elAss.onchange=async e=>{await updateDoc(ref('customers',c.id),{assigneeId:e.target.value});c.assigneeId=e.target.value;toast('担当者を更新しました');};
  const elAddCt=document.getElementById('add-contact-btn');if(elAddCt)elAddCt.onclick=()=>{showAddContact=true;editContactId=null;render();};
  const elCtCancel=document.getElementById('ct-cancel');if(elCtCancel)elCtCancel.onclick=()=>{showAddContact=false;editContactId=null;render();};
  const elCtSave=document.getElementById('ct-save');
  if(elCtSave)elCtSave.onclick=async()=>{
    const name=document.getElementById('ct-nm').value.trim();if(!name){alert('担当者名は必須です');return;}
    const data={customerId:c.id,name,phone:document.getElementById('ct-ph').value.trim(),email:document.getElementById('ct-em').value.trim(),department:document.getElementById('ct-dep').value.trim(),position:document.getElementById('ct-pos').value.trim(),note:document.getElementById('ct-note').value.trim()};
    const ctid=elCtSave.dataset.ctid;
    if(ctid){await updateDoc(ref('contacts',ctid),data);const idx=st.contacts.findIndex(x=>x.id===ctid);if(idx>=0)st.contacts[idx]={...st.contacts[idx],...data};editContactId=null;toast('更新しました');}
    else{data.createdAt=ts();const r=await addDoc(col('contacts'),data);st.contacts.push({id:r.id,...data});showAddContact=false;toast('担当者を追加しました');}
    render();
  };
  document.querySelectorAll('.edit-contact-btn').forEach(b=>b.onclick=()=>{editContactId=b.dataset.ctid;showAddContact=false;render();});
  document.querySelectorAll('.del-contact-btn').forEach(b=>b.onclick=async()=>{
    if(!confirm('この担当者を削除しますか？'))return;
    await deleteDoc(ref('contacts',b.dataset.ctid));st.contacts=st.contacts.filter(x=>x.id!==b.dataset.ctid);toast('削除しました');render();
  });
  const elAddCall=document.getElementById('add-call');if(elAddCall)elAddCall.onclick=()=>{showCallF=true;render();};
  const elHCancel=document.getElementById('h-cancel');if(elHCancel)elHCancel.onclick=()=>{showCallF=false;render();};
  const elHSave=document.getElementById('h-save');
  if(elHSave)elHSave.onclick=async()=>{
    if(elHSave.disabled)return;
    elHSave.disabled=true;
    const data={customerId:c.id,userId:st.user.id,calledAt:document.getElementById('h-dt').value,result:document.getElementById('h-res').value,memo:document.getElementById('h-memo').value.trim(),nextActionAt:document.getElementById('h-nat').value,nextActionContent:document.getElementById('h-nac').value.trim(),createdAt:ts()};
    try{
      const r=await addDoc(col('callHistory'),data);st.calls.push({id:r.id,...data});
      // ステータス自動連動
      const RESULT_STATUS_MAP={'アポ獲得':'アポ獲得','資料送付':'ナーチャリング','担当者NG':'架電NG','受付NG':'架電NG'};
      const suggestStatus=RESULT_STATUS_MAP[data.result];
      if(suggestStatus&&c.status!==suggestStatus){
        if(confirm(`架電結果「${data.result}」に対してステータスを「${suggestStatus}」に変更しますか？`)){
          await updateDoc(ref('customers',c.id),{status:suggestStatus});c.status=suggestStatus;
        }
      } else if(data.result==='アポ獲得'&&(c.status==='未架電'||c.status==='架電済')){
        await updateDoc(ref('customers',c.id),{status:'アポ獲得'});c.status='アポ獲得';
      } else if(c.status==='未架電'){
        await updateDoc(ref('customers',c.id),{status:'架電済'});c.status='架電済';
      }
      showCallF=false;toast('架電記録を保存しました');render();
    }catch(e){alert('保存に失敗しました: '+e.message);elHSave.disabled=false;}
  };
  document.querySelectorAll('.del-call').forEach(b=>b.onclick=async e=>{
    e.stopPropagation();if(!confirm('この架電記録を削除しますか？'))return;
    await deleteDoc(ref('callHistory',b.dataset.cid));st.calls=st.calls.filter(x=>x.id!==b.dataset.cid);toast('削除しました');render();
  });
  bCustForm(editCid?c:null);
}

// ============================================================
// My List
// ============================================================
function rMyList() {
  const viewUser=st.users.find(u=>u.id===assignViewUid)||st.user;
  const assigned=st.customers.filter(c=>c.assigneeId===viewUser.id);
  const now=new Date();

  // 各顧客の最新次回アクションを取得
  const getNextAction=cid=>{
    const calls=st.calls.filter(h=>h.customerId===cid&&h.nextActionAt).sort((a,b)=>new Date(b.calledAt)-new Date(a.calledAt));
    return calls.length?{at:calls[0].nextActionAt,content:calls[0].nextActionContent}:null;
  };

  // 次回アクション日でソート（期限近い順・未設定は後ろ）
  const withAction=assigned.map(c=>({...c,_na:getNextAction(c.id)}));
  withAction.sort((a,b)=>{
    if(a._na&&b._na)return new Date(a._na.at)-new Date(b._na.at);
    if(a._na)return -1;if(b._na)return 1;return 0;
  });

  const overdueCount=withAction.filter(c=>c._na&&new Date(c._na.at)<now).length;

  return `<div class="ph"><div class="pt">マイリスト</div></div>
  <div style="margin-bottom:16px">
    <div style="font-size:12px;color:var(--c-text2);margin-bottom:8px">表示するユーザーを選択：</div>
    <div class="user-switcher">
      ${st.users.map(u=>`<button class="user-chip${assignViewUid===u.id?' active':''}" data-uid="${u.id}">${esc(u.name)}（${st.customers.filter(c=>c.assigneeId===u.id).length}件）</button>`).join('')}
    </div>
  </div>
  ${overdueCount>0?`<div style="background:var(--c-red-bg);border:1px solid var(--c-red);border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;font-size:13px;color:var(--c-red);font-weight:600">⚠️ 次回アクション期限が過ぎている顧客が ${overdueCount} 件あります</div>`:''}
  <div style="font-size:14px;font-weight:600;margin-bottom:12px">${esc(viewUser.name)} の割り当てリスト（${assigned.length}件）</div>
  <div class="tw"><table><thead><tr>
    <th>会社名</th><th>電話番号</th><th>地域</th><th>ランク</th><th>ステータス</th><th>次回アクション</th>
  </tr></thead><tbody>
  ${withAction.length===0
    ?`<tr><td colspan="6" style="text-align:center;color:var(--c-text3);padding:32px">割り当てられた顧客がありません</td></tr>`
    :withAction.map(c=>{
      const na=c._na;
      const isOverdue=na&&new Date(na.at)<now;
      const naCell=na
        ?`<td style="font-size:12px;${isOverdue?'color:var(--c-red);font-weight:600':'color:var(--c-text2)'}">
            ${isOverdue?'⚠️ ':''}${new Date(na.at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}
            ${na.content?`<div style="font-size:11px;color:var(--c-text3)">${esc(na.content)}</div>`:''}
          </td>`
        :`<td style="color:var(--c-text3);font-size:12px">-</td>`;
      return `<tr class="row" data-id="${c.id}">
      <td><strong>${esc(c.companyName)}</strong></td>
      <td>${c.companyPhone?`<a href="tel:${esc(c.companyPhone)}" onclick="event.stopPropagation()">${esc(c.companyPhone)}</a>`:'-'}</td>
      <td style="color:var(--c-text2)">${esc([c.prefecture,c.city].filter(Boolean).join(' ')||'-')}</td>
      <td>${rankBadge(c.rank)}</td>
      <td><span class="badge s-${c.status||'未架電'}">${c.status||'未架電'}</span></td>
      ${naCell}
    </tr>`;}).join('')}
  </tbody></table></div>`;
}
function bMyList() {
  document.querySelectorAll('.user-chip[data-uid]').forEach(b=>b.onclick=()=>{assignViewUid=b.dataset.uid;render();});
  document.querySelectorAll('tr.row[data-id]').forEach(tr=>tr.onclick=()=>{st.selId=tr.dataset.id;st.view='detail';detailTab='contacts';showCallF=false;editCid=null;showAddContact=false;editContactId=null;render();});
}

// ============================================================
// Import ── 重複チェック・行ごとスキップ
// ============================================================
function rImport() {
  const rankOpts=`<option value="">未設定（ランクなし）</option>${RANKS.map(r=>`<option value="${r}"${importRank===r?' selected':''}>${r}ランク</option>`).join('')}`;

  // プレビューがある場合: 各行の重複候補を計算
  const rowDups = importPrev.map(r => findCsvDups(r));
  const dupRowCount = rowDups.filter(d=>d.length>0).length;
  const skipCount = importSkipSet.size;
  const importableCount = importPrev.filter((_,i)=>!importSkipSet.has(i)).filter(r=>(r['商号又は名称']||r['会社名']||'').trim()).length;

  return `<div class="ph"><div class="pt">CSVインポート</div></div>
  <div class="card">
    <div style="background:var(--c-blue-bg);color:var(--c-blue-text);padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:12px">
      <div style="font-weight:600;margin-bottom:6px">対応CSVフォーマット（1行目はヘッダー行・列順不問）</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:4px 16px;margin-top:6px">
        <div>・<strong>商号又は名称</strong> → 会社名</div>
        <div>・<strong>電話番号</strong> → 会社電話</div>
        <div>・<strong>メールアドレス</strong> → 会社メール</div>
        <div>・<strong>会社URL</strong> → HP（http/httpsのみ取込）</div>
        <div>・<strong>従業員数</strong> → 従業員数</div>
        <div>・<strong>更新回数</strong> → 更新回数</div>
        <div>・<strong>都道府県</strong>（M列）→ 都道府県</div>
        <div>・<strong>エリア</strong>（G列）→ 市区町村</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;align-items:end">
      <div><label>CSVファイルを選択</label><input type="file" id="csv-file" accept=".csv" style="padding:6px"></div>
      <div><label>インポート時のランク（任意・一括設定）</label><select id="imp-rank">${rankOpts}</select></div>
    </div>
    <div style="margin-bottom:14px"><label>またはCSVを直接貼り付け</label><textarea id="csv-txt" rows="6" style="font-family:monospace;font-size:12px" placeholder="ここにCSVデータを貼り付け...">${esc(importTxt)}</textarea></div>
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button id="csv-prev">プレビュー確認</button>
      ${importPrev.length>0?`<button class="primary" id="csv-imp">${importableCount}件をインポート${skipCount>0?`（${skipCount}件スキップ）`:''}</button>`:''}
      ${dupRowCount>0?`<button id="csv-skip-dups" style="border-color:#f59e0b;color:#b45309;font-size:12px">重複候補を全てスキップ</button>`:''}
      ${skipCount>0?`<button id="csv-reset-skip" style="font-size:12px">スキップをリセット</button>`:''}
    </div>
    ${dupRowCount>0?`<div style="background:#fff8e1;border:1px solid #f59e0b;border-radius:var(--radius);padding:8px 14px;margin-bottom:12px;font-size:13px;color:#b45309">
      ⚠️ <strong>${dupRowCount}行</strong>に既存顧客との重複の可能性があります。🟡行のチェックを外すとスキップできます。
    </div>`:''}
    ${importPrev.length>0?`
    <div style="font-size:12px;color:var(--c-text2);margin-bottom:8px">先頭30件プレビュー</div>
    <div class="tw"><table><thead><tr>
      <th style="width:36px">取込</th><th>会社名</th><th>電話番号</th><th>都道府県</th><th>市区町村</th><th>従業員数</th><th>更新回数</th><th>HP</th><th>重複候補</th>
    </tr></thead><tbody>
    ${importPrev.slice(0,30).map((r,i)=>{
      const url=r['会社URL']||r['HP（URL）']||r['HP']||'';
      const urlOk=isUrl(url);
      const dups=rowDups[i];
      const hasDup=dups&&dups.length>0;
      const isSkip=importSkipSet.has(i);
      const rowCls=isSkip?'csv-skip':(hasDup?'csv-dup':'');
      return `<tr class="${rowCls}">
        <td style="text-align:center"><input type="checkbox" class="csv-row-cb" data-idx="${i}" ${isSkip?'':'checked'} onclick="event.stopPropagation()"></td>
        <td>${esc(r['商号又は名称']||r['会社名']||'')}${hasDup?`<span class="csv-dup-badge">重複</span>`:''}</td>
        <td>${esc(r['電話番号']||r['電話番号（会社）']||'')}</td>
        <td>${esc(r['都道府県']||'')}</td>
        <td>${esc(r['エリア']||r['市区町村']||'')}</td>
        <td>${esc(r['従業員数']||'')}</td>
        <td>${esc(r['更新回数']||'')}</td>
        <td style="color:${urlOk?'inherit':'var(--c-text3)'}">${urlOk?esc(url):'（空欄）'}</td>
        <td style="font-size:11px;color:#b45309">${hasDup?dups.map(d=>esc(d.companyName)).join('、'):''}</td>
      </tr>`;
    }).join('')}
    </tbody></table></div>`:''}
  </div>`;
}

function bImport() {
  document.getElementById('csv-file').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{importTxt=ev.target.result;document.getElementById('csv-txt').value=importTxt;};
    rd.readAsText(f,'UTF-8');
  };
  const rankSel=document.getElementById('imp-rank');
  if(rankSel)rankSel.onchange=()=>{importRank=rankSel.value;};

  document.getElementById('csv-prev').onclick=()=>{
    importTxt=document.getElementById('csv-txt').value;
    importRank=document.getElementById('imp-rank').value;
    importPrev=parseCSV(importTxt);
    importSkipSet.clear();
    if(!importPrev.length){alert('データが見つかりません');return;}
    render();
  };

  // 行ごとのチェックボックス
  document.querySelectorAll('.csv-row-cb').forEach(cb=>{
    cb.onchange=()=>{
      const idx=parseInt(cb.dataset.idx);
      if(cb.checked) importSkipSet.delete(idx); else importSkipSet.add(idx);
      render();
    };
  });

  // 重複候補を全スキップ
  const skipDupsBtn=document.getElementById('csv-skip-dups');
  if(skipDupsBtn)skipDupsBtn.onclick=()=>{
    importPrev.forEach((_,i)=>{if(findCsvDups(importPrev[i]).length>0)importSkipSet.add(i);});
    render();
  };

  // スキップリセット
  const resetSkipBtn=document.getElementById('csv-reset-skip');
  if(resetSkipBtn)resetSkipBtn.onclick=()=>{importSkipSet.clear();render();};

  const elImp=document.getElementById('csv-imp');
  if(elImp)elImp.onclick=async()=>{
    elImp.disabled=true;elImp.textContent='インポート中...';
    const items=importPrev
      .filter((_,i)=>!importSkipSet.has(i))
      .map(r=>{
        const url=r['会社URL']||r['HP（URL）']||r['HP']||'';
        return {
          companyName: r['商号又は名称']||r['会社名']||'',
          companyPhone: r['電話番号']||r['電話番号（会社）']||'',
          companyEmail: r['メールアドレス']||r['メールアドレス（会社）']||'',
          website: isUrl(url)?url.trim():'',
          employees: r['従業員数']||'',
          renewalCount: r['更新回数']||'',
          prefecture: r['都道府県']||'',
          city: r['エリア']||r['市区町村']||'',
          rank: importRank||'',
          status:'未架電', assigneeId:'', createdAt:ts()
        };
      }).filter(x=>x.companyName);
    try{
      const BATCH=20;let success=0,failed=0;
      for(let i=0;i<items.length;i+=BATCH){
        const chunk=items.slice(i,i+BATCH);
        const results=await Promise.allSettled(chunk.map(item=>addDoc(col('customers'),item)));
        results.forEach((res,j)=>{
          if(res.status==='fulfilled'){st.customers.push({id:res.value.id,...chunk[j]});success++;}
          else failed++;
        });
      }
      const skipped=importSkipSet.size;
      importPrev=[];importTxt='';importRank='';importSkipSet.clear();
      toast(`${success}件をインポートしました${failed?`（${failed}件失敗）`:''}${skipped?`（${skipped}件スキップ）`:''}`);
      await reload();st.view='customers';render();
    }catch(e){alert('インポートに失敗しました: '+e.message);elImp.disabled=false;elImp.textContent='インポート';}
  };
}

// ============================================================
// Settings
// ============================================================
function rSettings() {
  if(st.user.role!=='admin')return`<div class="ph"><div class="pt">設定</div></div><div class="card" style="text-align:center;color:var(--c-text2);padding:40px">管理者のみアクセス可能です</div>`;
  return `<div class="ph"><div class="pt">設定 — ユーザー管理</div><button class="primary" id="add-u">+ ユーザー追加</button></div>
  <div class="anote">ユーザーを追加するとFirebase Authenticationにアカウントが作成されます。設定したメール・パスワードでログインできます。</div>
  ${showAddU?rUserForm(null):''}
  <div class="tw"><table><thead><tr>
    <th>名前</th><th>メールアドレス</th><th>権限</th><th style="text-align:right">架電目標/日</th><th style="text-align:right">アポ目標/日</th><th style="text-align:right">操作</th>
  </tr></thead><tbody>
  ${st.users.map(u=>editUid===u.id?`<tr><td colspan="6" style="padding:0">${rUserForm(u)}</td></tr>`:
  `<tr><td><strong>${esc(u.name)}</strong></td><td style="color:var(--c-text2)">${esc(u.email||'-')}</td>
  <td>${u.role==='admin'?`<span class="badge" style="background:var(--c-blue-bg);color:var(--c-blue-text)">管理者</span>`:`<span class="badge" style="background:var(--c-bg3);color:var(--c-text2)">ユーザー</span>`}</td>
  <td style="text-align:right">${u.callTarget||0}</td><td style="text-align:right">${u.apoTarget||0}</td>
  <td style="text-align:right">
    <button class="sm eu" data-uid="${u.id}">編集</button>
    ${u.id!==st.user.id?`<button class="sm danger du" data-uid="${u.id}" data-name="${esc(u.name)}">削除</button>`:''}
  </td></tr>`).join('')}
  </tbody></table></div>`;
}
function rUserForm(u) {
  const v=u||{};const isNew=!u;
  return `<div class="card" style="margin-bottom:14px">
  <div style="font-size:14px;font-weight:600;margin-bottom:12px">${u?'ユーザー編集':'ユーザー追加'}</div>
  <div id="uf-err" style="display:none" class="err-box"></div>
  <div class="fg2">
    <div><label>名前 *</label><input id="uf-n" value="${esc(v.name||'')}"></div>
    <div><label>メールアドレス *</label><input id="uf-e" type="email" value="${esc(v.email||'')}" ${!isNew?'readonly style="background:var(--c-bg2);color:var(--c-text2)"':''}>
    ${!isNew?'<div class="pw-hint">メールアドレスは変更できません</div>':''}</div>
    ${isNew?`<div><label>初期パスワード *</label><input id="uf-pw" type="password" placeholder="6文字以上"><div class="pw-hint">後でパスワードリセット可能</div></div>`:''}
    <div><label>権限</label><select id="uf-r"><option value="user"${v.role!=='admin'?' selected':''}>ユーザー</option><option value="admin"${v.role==='admin'?' selected':''}>管理者</option></select></div>
    <div><label>架電目標/日</label><input id="uf-ct" type="number" value="${v.callTarget||30}"></div>
    <div><label>アポ目標/日</label><input id="uf-at" type="number" value="${v.apoTarget||3}"></div>
  </div>
  <div class="fa"><button id="uf-cancel">キャンセル</button><button class="primary" id="uf-save">保存</button></div></div>`;
}
function bSettings() {
  document.getElementById('add-u').onclick=()=>{showAddU=!showAddU;editUid=null;render();};
  document.querySelectorAll('.eu').forEach(b=>b.onclick=()=>{editUid=b.dataset.uid;showAddU=false;render();});
  document.querySelectorAll('.du').forEach(b=>b.onclick=async()=>{
    if(!confirm(`「${b.dataset.name}」を削除しますか？`))return;
    await deleteDoc(ref('users',b.dataset.uid));st.users=st.users.filter(u=>u.id!==b.dataset.uid);toast('削除しました');render();
  });
  const elUfCancel=document.getElementById('uf-cancel');if(elUfCancel)elUfCancel.onclick=()=>{showAddU=false;editUid=null;render();};
  const elUfSave=document.getElementById('uf-save');if(!elUfSave)return;
  elUfSave.onclick=async()=>{
    const name=document.getElementById('uf-n').value.trim();
    const email=document.getElementById('uf-e').value.trim();
    const errEl=document.getElementById('uf-err');errEl.style.display='none';
    if(!name){errEl.textContent='名前は必須です';errEl.style.display='block';return;}
    const data={name,role:document.getElementById('uf-r').value,callTarget:parseInt(document.getElementById('uf-ct').value)||0,apoTarget:parseInt(document.getElementById('uf-at').value)||0};
    if(editUid){
      await updateDoc(ref('users',editUid),data);
      const idx=st.users.findIndex(u=>u.id===editUid);if(idx>=0)st.users[idx]={...st.users[idx],...data};
      editUid=null;toast('保存しました');render();
    } else {
      if(!email){errEl.textContent='メールアドレスは必須です';errEl.style.display='block';return;}
      const pw=document.getElementById('uf-pw')?.value||'';
      if(!pw||pw.length<6){errEl.textContent='パスワードは6文字以上で入力してください';errEl.style.display='block';return;}
      const dup=st.users.find(u=>(u.email||'').toLowerCase()===email.toLowerCase());
      if(dup){errEl.textContent='このメールアドレスは既に登録されています';errEl.style.display='block';return;}
      elUfSave.disabled=true;
      try{
        // サブアプリを使い現在の管理者セッションを保護する
        const subApp=initializeApp(firebaseConfig,'sub-'+Date.now());
        const subAuth=getAuth(subApp);
        let cred;
        try{
          cred=await createUserWithEmailAndPassword(subAuth,email,pw);
        }finally{
          await signOut(subAuth).catch(()=>{});
          await deleteApp(subApp).catch(()=>{});
        }
        const fullData={...data,email,uid:cred.user.uid,createdAt:ts()};
        const r=await addDoc(col('users'),fullData);
        st.users.push({id:r.id,...fullData});showAddU=false;toast('ユーザーを追加しました');render();
      }catch(e){errEl.textContent=authErrMsg(e.code);errEl.style.display='block';elUfSave.disabled=false;}
    }
  };
}
</script>
